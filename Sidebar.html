<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <!-- Inclusion des Polices Officielles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Import Chart.js pour le graphique -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Inclusion du CSS -->
  <?!= include('Stylesheet'); ?>
</head>
<body>

  <!-- Overlay de chargement officiel -->
  <div id="loadingOverlay">
    <div class="overlay-spinner"></div>
    <div style="font-weight: 500; color: var(--primary); font-size: 13px;" id="loadingText"></div>
  </div>

  <div class="container">
    <!-- Carte Principale (Graphique et Statut) -->
    <div class="card" style="margin-top: 12px;">
      <canvas id="usageChart" width="200" height="200"></canvas>
      
      <div style="margin-top: 16px;">
        <div class="stat-row">
          <span class="stat-label" id="ui_total_used">Total utilisé :</span>
          <span class="stat-value" id="totalUsedVal">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label" id="ui_limit">Limite Google :</span>
          <span class="stat-value">10 000 000</span>
        </div>
        <div class="stat-row" style="border: none; align-items: center;">
          <span class="stat-label" id="ui_status">Statut :</span>
          <span class="badge green" id="statusBadge">OK</span>
        </div>
      </div>
      
      <button class="btn btn-primary" id="btnAnalyze" onclick="startAnalysis()" style="margin-top:16px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
        </svg>
        <span id="txtBtnAnalyze">Analyser</span>
      </button>

      <button class="btn btn-secondary" id="btnClean" onclick="startCleaning()" style="margin-top:8px; display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zm2.46-7.12l1.41-1.41L12 12.59l2.12-2.12 1.41 1.41L13.41 14l2.12 2.12-1.41 1.41L12 15.41l-2.12 2.12-1.41-1.41L10.59 14l-2.13-2.12zM15.5 4l-1-1h-5l-1 1H5v2h14V4z"/>
        </svg>
        <span id="txtBtnClean">Nettoyer</span>
      </button>

      <div class="progress-bar" id="progressBarContainer">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <div id="statusText">Prêt.</div>
    </div>

    <!-- Modal de confirmation de nettoyage -->
    <div id="confirmModal">
      <div class="modal-content">
        <h3 id="ui_modal_title" style="margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#fbbc04">
            <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
          </svg>
          Attention
        </h3>
        <p id="confirmMsg" style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5;"></p>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
          <button class="btn btn-secondary" style="width: auto;" id="ui_btn_cancel" onclick="closeConfirmModal()">Annuler</button>
          <button class="btn btn-danger" style="width: auto;" id="ui_btn_confirm" onclick="executeCleaning()">Confirmer</button>
        </div>
      </div>
    </div>

    <!-- Carte de résultat de nettoyage (persistante) -->
    <div class="card" id="resultCard" style="display: none; border-color: var(--primary);">
      <h3 id="ui_result_title" style="font-size: 12px; margin-bottom: 8px; color: var(--primary); display: flex; align-items: center; gap: 6px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
        Résultat du nettoyage
      </h3>
      <p id="cleanResultText" style="font-size: 11px; white-space: pre-wrap; margin-bottom: 12px; color: var(--text-main); background: var(--bg-app); padding: 8px; border-radius: 4px; max-height: 150px; overflow-y: auto;"></p>
      <button class="btn btn-primary" id="ui_btn_close_result" onclick="closeResultCard()">Compris, rafraîchir l'analyse</button>
    </div>

    <!-- Carte Détails -->
    <div class="card" id="detailsCard" style="display:none;">
      <div class="card-title" id="ui_details">Détails par feuille</div>
      <ul id="sheetsList"></ul>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toastNotification" class="toast"></div>

  <!-- Pied de page officiel FF Labs -->
  <div class="footer">
    <div class="footer-logo">
      <span>⚡ FF Labs</span>
    </div>
    <div>
      <a href="https://faucheux.bzh" target="_blank" style="color: inherit; text-decoration: none;">&lt;&gt; par Fabrice Faucheux</a>
    </div>
    <div class="footer-links">
      <a href="https://github.com/FabriceFx/CalculNombreCellule" target="_blank" id="txt-footerHelp">Aide</a>
    </div>
  </div>

  <!-- Définition de la locale avant l'inclusion du script -->
  <script>
    const USER_LOCALE = "<?!= locale ?>".toLowerCase().startsWith('fr') ? 'fr' : 'en';
  </script>

  <!-- Inclusion du JS -->
  <?!= include('JavaScript'); ?>
</body>
</html>
