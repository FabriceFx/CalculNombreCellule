<style>
  /* Variables CSS — Charte Google Workspace (Material Design 3) */
  :root {
    --primary: #0b57d0;
    --primary-hover: #0842a0;
    --secondary: #444746;
    --bg-app: #f3f6fc;
    --bg-card: #ffffff;
    --text-main: #1f1f1f;
    --text-muted: #444746;
    --border: #c7c7c7;
    --border-light: #e3e3e3;
    --border-focus: #0b57d0;
    --success: #146c2e;
    --error: #b3261e;
    --radius-lg: 16px;
    --radius-md: 8px;
    --radius-sm: 4px;
    --radius-pill: 100px;
    --transition: all 0.15s ease-in-out;
    --footer-height: 60px;
  }

  /* Reset & Base */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Open Sans', 'Inter', system-ui, -apple-system, sans-serif;
    background-color: var(--bg-app);
    color: var(--text-main);
    font-size: 13px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Conteneur principal défilant */
  .container {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    padding-bottom: var(--footer-height);
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: none;
    transition: var(--transition);
  }

  .card:hover {
    border-color: #b8b8b8;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text-main);
  }

  /* Boutons d'Action */
  .btn {
    width: 100%;
    padding: 8px 16px;
    font-weight: 600;
    font-size: 12px;
    text-align: center;
    cursor: pointer;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    transition: var(--transition);
    margin-top: 4px;
    border: none;
  }
  
  .btn:disabled {
    background-color: #e0e0e0;
    color: #9aa0a6;
    cursor: not-allowed;
    box-shadow: none;
  }

  .btn-primary {
    background-color: var(--primary);
    color: white;
    border-radius: var(--radius-pill);
  }

  .btn-primary:hover:not(:disabled) {
    background-color: var(--primary-hover);
    box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
  }

  .btn-secondary {
    background-color: transparent;
    color: var(--primary);
    border: 1px solid #747775;
    border-radius: var(--radius-pill);
  }

  .btn-secondary:hover:not(:disabled) {
    background-color: var(--bg-app);
    border-color: var(--primary);
  }
  
  .btn-danger {
    background-color: var(--error);
    color: white;
    border-radius: var(--radius-pill);
  }

  .btn-danger:hover:not(:disabled) {
    background-color: #8c1d18;
    box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
  }

  /* Pied de page figé */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: var(--footer-height);
    padding: 10px 12px;
    background-color: var(--bg-card);
    border-top: 1px solid var(--border-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--text-muted);
    z-index: 10;
  }

  .footer-logo {
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 600;
    color: var(--secondary);
  }

  .footer-links a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
  }

  .footer-links a:hover {
    text-decoration: underline;
  }

  /* Overlay chargeur flouté */
  #loadingOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(4px);
    display: flex;
    flex-direction: column;
    gap: 12px;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  #loadingOverlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .overlay-spinner {
    width: 24px;
    height: 24px;
    border: 3px solid rgba(11, 87, 208, 0.15);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Toast Notification */
  .toast {
    position: fixed;
    bottom: calc(var(--footer-height) + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #322f35;
    color: #f5eff7;
    padding: 10px 16px;
    border-radius: var(--radius-md);
    font-size: 11px;
    font-weight: 400;
    box-shadow: 0 3px 5px -1px rgba(0,0,0,0.2), 0 6px 10px 0 rgba(0,0,0,0.14);
    z-index: 2000;
    opacity: 0;
    transition: all 0.2s ease-in-out;
    pointer-events: none;
    white-space: pre-wrap;
    max-width: 90%;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error { border-left: 4px solid var(--error); }
  .toast.success { border-left: 4px solid var(--success); }
  
  /* Additional Custom Styles for the App */
  .stat-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-light);
  }
  .stat-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .stat-label { font-weight: 500; font-size: 12px;}
  .stat-value { font-weight: bold; font-size: 12px;}
  
  .badge {
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: bold;
    color: white;
  }
  .badge.green { background-color: var(--success); }
  .badge.yellow { background-color: var(--warning); color: #000; }
  .badge.red { background-color: var(--error); }
  
  ul#sheetsList {
    list-style-type: none;
    padding: 0;
    margin: 0;
    max-height: 200px;
    overflow-y: auto;
  }
  ul#sheetsList li {
    font-size: 11px;
    padding: 6px 0;
    border-bottom: 1px solid var(--bg-app);
    display: flex;
    justify-content: space-between;
  }
  
  .progress-bar {
    width: 100%;
    background-color: var(--border-light);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-top: 8px;
    display: none;
  }
  .progress-bar-fill {
    height: 6px;
    background-color: var(--primary);
    width: 0%;
    transition: width 0.3s ease;
  }
  #statusText {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: center;
  }
  
  /* Modal */
  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  #confirmModal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-content {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    width: 85%;
    padding: 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
</style>
